name: momento
description: "Momento – Private video journals, E2EE encrypted."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  app_links: ^7.0.0
  camera: ^0.12.0+1
  cloud_firestore: ^6.6.0
  crypto: ^3.0.6
  encrypt: ^5.0.3
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.1
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_dotenv: ^6.0.1
  gal: ^2.3.2
  go_router: ^17.3.0
  google_sign_in: ^6.3.0
  home_widget: ^0.9.3
  http: ^1.6.0
  image_picker: ^1.2.2
  intl: ^0.20.3
  path_provider: ^2.1.6
  permission_handler: ^12.0.3
  share_plus: ^13.2.0
  shared_preferences: ^2.5.5
  dart_jsonwebtoken: ^2.8.3
  video_compress: ^3.1.4
  video_player: ^2.11.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  timeago: ^3.7.1
  cupertino_icons: ^1.0.9
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  isar_generator: ^3.1.0+1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/google_logo.png
    - assets/app_icon.png
    - assets/service_account.json

flutter_native_splash:
  color: "#FDF4F8"
  image: "assets/app_icon.png"
  android_12:
    image: "assets/app_icon.png"
    icon_background_color: "#FDF4F8"
    color: "#FDF4F8"
